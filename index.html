    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary-blue': '#A8DADC',
              'secondary-blue': '#B8E6E8',
              'cream': '#F8F6F3',
              'sage': '#C7D8C6',
              'text-dark': '#4A4A4A',
              'text-light': '#6B6B6B',
              'accent': '#457B9D',
            },
            fontFamily: {
              sans: ['Inter', 'Helvetica Neue', 'sans-serif'],
            },
            borderRadius: {
              '2xl': '16px',
            },
            boxShadow: {
              'soft': '0 4px 20px rgba(0,0,0,0.08)',
              'soft-hover': '0 6px 24px rgba(0,0,0,0.12)',
              'answer-selected': '0 4px 12px rgba(168, 218, 220, 0.4)',
            },
            animation: {
              'float': 'float 15s ease-in-out infinite',
              'confetti': 'confetti-fall 5s ease-out forwards',
              'gentle-pulse': 'gentle-pulse 7s ease-in-out infinite',
              'gentle-sway': 'gentle-sway 9s ease-in-out infinite alternate',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              'confetti-fall': {
                '0%': { transform: 'translateY(-100%) scale(1)', opacity: '1' },
                '100%': { transform: 'translateY(100vh) scale(0.5)', opacity: '0' },
              },
              'gentle-pulse': {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '0.97', transform: 'scale(1.005)' },
              },
              'gentle-sway': {
                '0%': { transform: 'translateX(-1px) rotate(-0.2deg)' },
                '100%': { transform: 'translateX(1px) rotate(0.2deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .gradient-bg {
        background: linear-gradient(45deg, #F8F6F3, #B8E6E8);
      }
      .gradient-bg-results {
        background: linear-gradient(135deg, #F8F6F3, #A8DADC);
      }
      .breathing-circle-exhale {
        animation: exhale 0.6s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
      }
      .breathing-circle-inhale {
        animation: inhale 0.6s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
      }
      @keyframes exhale {
        from { transform: scale(1); }
        to { transform: scale(0.5); }
      }
      @keyframes inhale {
        from { transform: scale(0.5); }
        to { transform: scale(1); }
      }
    </style>
